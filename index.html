<!DOCTYPE html>
<html lang="tr">
<head>
    <meta charset="UTF-8">
    <title>SPACERS SPACE // MASTER TERMINAL v9.0</title>
    <style>
        :root { --neon: #00ff41; --bg: #050505; --panel: #0d0d0d; --border: #1a1a2e; }
        body { background: var(--bg); color: var(--neon); font-family: 'Courier New', monospace; margin: 0; display: flex; height: 100vh; overflow: hidden; }
        
        /* SIDEBAR - ODALAR */
        #sidebar { width: 250px; background: var(--panel); border-right: 1px solid var(--border); padding: 20px; display: flex; flex-direction: column; gap: 10px; }
        
        /* MAIN - SOHBET VE GÖRSEL */
        #main-view { flex: 1; padding: 20px; display: flex; flex-direction: column; gap: 15px; }
        #chat-stream { flex: 1; background: #000; border: 1px solid var(--border); border-radius: 8px; padding: 15px; overflow-y: auto; }
        
        /* RIGHT - ADMIN & AYARLAR */
        #admin-zone { width: 300px; background: var(--panel); border-left: 1px solid var(--border); padding: 20px; }
        
        input, button { background: #000; color: var(--neon); border: 1px solid var(--neon); padding: 12px; width: 100%; margin-bottom: 10px; cursor: pointer; text-transform: uppercase; font-weight: bold; }
        .msg { border-bottom: 1px solid #111; padding: 8px 0; }
        .admin-secret { display: none; margin-top: 20px; border-top: 2px dashed #ff0; pt: 10px; }
        .img-preview { max-width: 200px; margin-top: 5px; display: block; }
    </style>
</head>
<body>

    <div id="sidebar">
        <h3>🛰️ İSTASYON ODALARI</h3>
        <div id="room-list" style="display: flex; flex-direction: column; gap: 5px;">
            <button onclick="switchRoom('Genel')"># GENEL</button>
            <button onclick="switchRoom('Gözlem')"># GÖZLEM</button>
        </div>
        <input type="text" id="new-room-input" placeholder="Yeni Oda Adı...">
        <button onclick="createRoom()">+ ODA AÇ</button>
    </div>

    <div id="main-view">
        <h2 id="room-header"># GENEL</h2>
        <div id="chat-stream"></div>
        <div style="display: flex; gap: 10px;">
            <input type="text" id="msg-input" placeholder="Mesaj gönder...">
            <input type="text" id="img-input" placeholder="Fotoğraf Linki (Opsiyonel)...">
            <button onclick="sendMessage()" style="width: 150px;">YAYINLA</button>
        </div>
    </div>

    <div id="admin-zone">
        <h3>🛠️ YÖNETİM PANELİ</h3>
        <input type="text" id="nick-input" placeholder="Kod Adın...">
        <input type="password" id="admin-key" placeholder="Admin Anahtarı...">
        <button onclick="authenticate()">KİMLİK DOĞRULA</button>
        
        <div id="admin-secret" class="admin-secret">
            <h4 style="color: #ff0;">BAŞKOMUTAN YETKİLERİ</h4>
            <button onclick="purgeLogs()">SİSTEMİ TEMİZLE</button>
            <div id="spy-logs" style="font-size: 10px; color: #777;"></div>
        </div>
    </div>

<script>
    // --- MASTER TERMINAL LOGİĞİ ---
    let currentRoom = "Genel";
    let currentUser = "Spacer";
    let isAdmin = false;

    function switchRoom(r) {
        currentRoom = r;
        document.getElementById('room-header').innerText = "# " + r.toUpperCase();
        document.getElementById('chat-stream').innerHTML = `<div class="msg">Sistem: ${r} odasına geçiş yapıldı.</div>`;
    }

    function createRoom() {
        let r = document.getElementById('new-room-input').value;
        if(!r) return;
        let btn = document.createElement('button');
        btn.innerText = "# " + r.toUpperCase();
        btn.onclick = () => switchRoom(r);
        document.getElementById('room-list').appendChild(btn);
        document.getElementById('new-room-input').value = "";
    }

    function authenticate() {
        currentUser = document.getElementById('nick-input').value || "Gezgin";
        if(document.getElementById('admin-key').value === "1453") {
            isAdmin = true;
            document.getElementById('admin-secret').style.display = "block";
            alert("Sistem Erişimi: Başkomutan Yetkisi Onaylandı.");
        }
    }

    function sendMessage() {
        let txt = document.getElementById('msg-input').value;
        let img = document.getElementById('img-input').value;
        if(!txt && !img) return;

        let msgDiv = document.createElement('div');
        msgDiv.className = 'msg';
        msgDiv.innerHTML = `<strong>${currentUser}</strong>: ${txt} ${img ? `<br><img src="${img}" class="img-preview">` : ''}`;
        
        document.getElementById('chat-stream').appendChild(msgDiv);
        document.getElementById('msg-input').value = "";
        document.getElementById('img-input').value = "";

        if(isAdmin) {
            document.getElementById('spy-logs').innerHTML += `<div>[${new Date().toLocaleTimeString()}] ${currentUser} -> ${currentRoom}</div>`;
        }
    }

    function purgeLogs() {
        document.getElementById('chat-stream').innerHTML = "";
    }
</script>
</body>
</html>
